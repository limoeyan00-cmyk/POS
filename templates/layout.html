<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity POS - Restaurant & Guesthouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar-active { background-color: #1e293b; border-left: 4px solid #10b981; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col fixed h-full">
            <div class="p-6 border-b border-slate-800">
                <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
                    <i class="fas fa-hotel text-emerald-500"></i>
                    AG POS
                </h1>
            </div>
            <nav class="flex-1 p-4 space-y-2 mt-4">
                <a href="/" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition {% if active_page == 'dashboard' %}sidebar-active{% endif %}">
                    <i class="fas fa-th-large w-5"></i> Dashboard
                </a>
                <a href="/customers" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition {% if active_page == 'customers' %}sidebar-active{% endif %}">
                    <i class="fas fa-users w-5"></i> Customers
                </a>
                <a href="/inventory" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition {% if active_page == 'inventory' %}sidebar-active{% endif %}">
                    <i class="fas fa-utensils w-5"></i> Menu & Rooms
                </a>
                <a href="/billing" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition {% if active_page == 'billing' %}sidebar-active{% endif %}">
                    <i class="fas fa-shopping-cart w-5"></i> New Bill
                </a>
                <a href="/reports" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition {% if active_page == 'reports' %}sidebar-active{% endif %}">
                    <i class="fas fa-chart-line w-5"></i> Reports
                </a>
            </nav>
            <div class="p-6 border-t border-slate-800 text-xs text-slate-500">
                v1.0.0 (Kenyan SME)
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-64 flex flex-col">
            <!-- Header -->
            <header class="h-16 bg-white border-b flex items-center justify-between px-8 sticky top-0 z-10">
                <div class="flex items-center gap-4">
                    {% if settings.offline_mode == "True" %}
                    <div class="flex items-center gap-2 px-3 py-1 bg-amber-50 text-amber-700 rounded-full text-xs font-bold border border-amber-200">
                        <i class="fas fa-wifi-slash"></i> RUNNING OFFLINE
                    </div>
                    {% else %}
                    <div class="flex items-center gap-2 px-3 py-1 bg-emerald-50 text-emerald-700 rounded-full text-xs font-bold border border-emerald-200">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        ONLINE
                    </div>
                    {% endif %}
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm font-medium text-slate-600">Admin Staff</span>
                    <div class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-xs font-bold">AS</div>
                </div>
            </header>

            <div class="p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

</body>
</html>
